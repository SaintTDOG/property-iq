<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropertyIQ — Should you buy this property?</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9fafb; color: #111827; -webkit-font-smoothing: antialiased; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 32px; height: 32px; border: 2px solid #d1d5db; border-top-color: #111827; border-radius: 50%; animation: spin 0.8s linear infinite; }
input:focus, textarea:focus, select:focus { outline: none; box-shadow: 0 0 0 2px #111827; border-color: transparent; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const SYSTEM_PROMPT = `You are PropertyIQ, an expert Australian property analyst and buyer's advisor. You combine deep market knowledge with buyer psychology expertise to help people make smarter property decisions.

When analysing a property listing, you must return a JSON object (and ONLY a JSON object, no markdown, no backticks) with this exact structure:

{
  "listing": {
    "address": "Full address",
    "price": "Listed price or price guide",
    "type": "House/Apartment/Townhouse/etc",
    "beds": 3,
    "baths": 1,
    "parking": 1,
    "land": "Land size if available or N/A",
    "daysOnMarket": null,
    "agent": "Agency name if known or N/A",
    "description": "Brief 1-2 sentence summary of the listing"
  },
  "analysis": {
    "priceAssessment": {
      "verdict": "Likely Overpriced / Fair Value / Potential Deal / Insufficient Data",
      "confidence": "Low / Medium / High",
      "detail": "2-3 sentences analysing the price relative to comparable sales, condition, and market position."
    },
    "timeOnMarket": {
      "signal": "Just Listed / Normal Range / Seller Pressure Building / Stale Listing / Unknown",
      "detail": "2-3 sentences about what the time on market tells us about seller motivation and negotiation leverage."
    },
    "risks": [
      {
        "category": "Risk category name",
        "level": "Low / Low-Medium / Medium / High",
        "detail": "2-3 sentences about this specific risk and what the buyer should investigate."
      }
    ],
    "negotiation": {
      "strategy": "Strategy name",
      "openingOffer": "Suggested opening offer range",
      "detail": "3-4 sentences on negotiation approach, leverage points, and tactics.",
      "psychologyNotes": [
        "Tactical note about agent/vendor psychology",
        "Another tactical note",
        "A third tactical note"
      ]
    },
    "areaOutlook": {
      "trajectory": "Strong Growth / Moderate Growth / Stable / Declining / Mixed Signals",
      "detail": "2-3 sentences on suburb trajectory, infrastructure, demographic trends."
    },
    "buyerPsychology": {
      "flags": [
        {
          "bias": "Name of cognitive bias",
          "warning": "2-3 sentences explaining how this bias might affect the buyer's judgment on this specific property."
        }
      ]
    },
    "summary": "3-4 sentence bottom-line assessment. Be direct about whether this is worth pursuing and at what price. Include the most important action items."
  }
}

Important guidelines:
- Use Australian English spelling (analyse, colour, metre, etc.)
- Reference Australian-specific factors: stamp duty, strata, council rates, bushfire/flood zones, ANEF contours for airport noise, Section 32/Contract for Sale
- Be specific with dollar amounts in AUD
- Include 3-5 risk factors relevant to this specific property
- Include 3 buyer psychology flags relevant to the situation
- If you receive a URL, extract whatever you can from the URL itself (suburb, property type, platform) and use your knowledge of that area
- If information is missing, make reasonable inferences but flag your confidence level
- Be direct and actionable
- When you don't have enough data, say so clearly rather than guessing
- Always recommend building and pest inspection for houses/townhouses
- Factor in renovation costs when a property is described as needing work`;

/* --- API Call --- */
async function analyseProperty(apiKey, listingUrl, manualDetails) {
  let userMessage;
  if (listingUrl) {
    userMessage = "Please analyse this Australian property listing. Here is the listing URL: " + listingUrl + "\n\nExtract whatever details you can infer from the URL (suburb, property type, etc.) and provide your full analysis. If the URL contains a suburb name, use your knowledge of that area for comparable sales, risk factors, and area outlook.";
  } else if (manualDetails) {
    userMessage = "Please analyse this Australian property based on the following details:\n\n";
    if (manualDetails.address) userMessage += "Address: " + manualDetails.address + "\n";
    if (manualDetails.suburb) userMessage += "Suburb: " + manualDetails.suburb + ", " + manualDetails.state + "\n";
    if (manualDetails.price) userMessage += "Asking Price: " + manualDetails.price + "\n";
    if (manualDetails.type) userMessage += "Property Type: " + manualDetails.type + "\n";
    if (manualDetails.beds) userMessage += "Bedrooms: " + manualDetails.beds + "\n";
    if (manualDetails.baths) userMessage += "Bathrooms: " + manualDetails.baths + "\n";
    if (manualDetails.parking) userMessage += "Parking: " + manualDetails.parking + "\n";
    if (manualDetails.land) userMessage += "Land Size: " + manualDetails.land + "\n";
    if (manualDetails.daysOnMarket) userMessage += "Days on Market: " + manualDetails.daysOnMarket + "\n";
    if (manualDetails.agent) userMessage += "Agent: " + manualDetails.agent + "\n";
    if (manualDetails.notes) userMessage += "\nBuyer's Notes: " + manualDetails.notes + "\n";
    userMessage += "\nProvide your full analysis.";
  }

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 4096,
      system: SYSTEM_PROMPT,
      messages: [{ role: "user", content: userMessage }]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || "API request failed (" + response.status + ")");
  }

  const data = await response.json();
  const text = data.content[0].text;

  let jsonStr = text;
  const jsonMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (jsonMatch) jsonStr = jsonMatch[1];
  jsonStr = jsonStr.trim();

  return JSON.parse(jsonStr);
}

/* --- Utility Components --- */
function Badge({ text, bg, color, border }) {
  return <span style={{display:'inline-block',fontSize:'13px',fontWeight:600,padding:'4px 12px',borderRadius:'9999px',background:bg,color:color,border:"1px solid " + border}}>{text}</span>;
}

function RiskBadge({ level }) {
  const map = {
    "Low": { bg:'#d1fae5',color:'#065f46' },
    "Low-Medium": { bg:'#fef3c7',color:'#92400e' },
    "Medium": { bg:'#ffedd5',color:'#9a3412' },
    "High": { bg:'#fee2e2',color:'#991b1b' }
  };
  const c = map[level] || { bg:'#f3f4f6',color:'#374151' };
  return <span style={{fontSize:'12px',fontWeight:500,padding:'2px 8px',borderRadius:'9999px',background:c.bg,color:c.color}}>{level}</span>;
}

function SectionCard({ title, icon, children }) {
  return (
    <div style={{background:'#fff',borderRadius:'12px',border:'1px solid #e5e7eb',padding:'20px 24px',marginBottom:'16px'}}>
      <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'16px'}}>
        <span style={{fontSize:'18px'}}>{icon}</span>
        <h3 style={{fontSize:'15px',fontWeight:600,color:'#111827'}}>{title}</h3>
      </div>
      {children}
    </div>
  );
}

/* --- Loading Animation --- */
function LoadingState() {
  const steps = [
    "Reading listing details...",
    "Researching comparable sales...",
    "Assessing area risk factors...",
    "Analysing market positioning...",
    "Evaluating negotiation leverage...",
    "Generating buyer psychology profile...",
    "Compiling your property report..."
  ];
  const [current, setCurrent] = useState(0);

  useEffect(() => {
    const timer = setInterval(() => {
      setCurrent(prev => prev < steps.length - 1 ? prev + 1 : prev);
    }, 2000);
    return () => clearInterval(timer);
  }, []);

  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'80px 20px'}}>
      <div className="spinner" style={{marginBottom:'24px'}}></div>
      <div style={{textAlign:'center'}}>
        {steps.map((step, i) => (
          <p key={i} style={{fontSize:'14px',padding:'3px 0',transition:'all 0.3s',color: i<=current ? '#111827' : '#d1d5db',fontWeight: i===current ? 500 : 400}}>
            {i < current ? "\u2713 " : i === current ? "\u2192 " : "  "}{step}
          </p>
        ))}
      </div>
      <p style={{fontSize:'12px',color:'#9ca3af',marginTop:'24px'}}>This usually takes 15-30 seconds</p>
    </div>
  );
}

/* --- Property Details Header --- */
function PropertyDetails({ listing }) {
  return (
    <div style={{background:'#f9fafb',borderRadius:'12px',border:'1px solid #e5e7eb',padding:'20px',marginBottom:'20px'}}>
      <div style={{display:'flex',flexWrap:'wrap',justifyContent:'space-between',gap:'16px'}}>
        <div>
          <h2 style={{fontSize:'18px',fontWeight:600,color:'#111827',marginBottom:'4px'}}>{listing.address}</h2>
          <p style={{fontSize:'13px',color:'#6b7280'}}>{listing.agent && listing.agent !== "N/A" ? listing.agent : ""}{listing.daysOnMarket ? " \u00b7 Listed " + listing.daysOnMarket + " days ago" : ""}</p>
        </div>
        <div style={{textAlign:'right'}}>
          <p style={{fontSize:'24px',fontWeight:700,color:'#111827'}}>{listing.price}</p>
          <p style={{fontSize:'13px',color:'#6b7280'}}>{listing.type}</p>
        </div>
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:'16px',marginTop:'16px',paddingTop:'16px',borderTop:'1px solid #e5e7eb'}}>
        {listing.beds != null && <span style={{fontSize:'13px',color:'#4b5563'}}><strong>{listing.beds}</strong> Beds</span>}
        {listing.baths != null && <span style={{fontSize:'13px',color:'#4b5563'}}><strong>{listing.baths}</strong> Bath</span>}
        {listing.parking != null && <span style={{fontSize:'13px',color:'#4b5563'}}><strong>{listing.parking}</strong> Parking</span>}
        {listing.land && listing.land !== "N/A" && <span style={{fontSize:'13px',color:'#4b5563'}}><strong>{listing.land}</strong> Land</span>}
      </div>
    </div>
  );
}

/* --- Full Analysis Report --- */
function AnalysisReport({ data }) {
  const { listing, analysis } = data;
  const bodyText = {fontSize:'14px',color:'#374151',lineHeight:'1.65'};
  return (
    <div>
      <PropertyDetails listing={listing} />

      <div style={{background:'#111827',borderRadius:'12px',padding:'20px 24px',marginBottom:'16px'}}>
        <p style={{fontSize:'12px',fontWeight:500,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'8px'}}>Bottom Line</p>
        <p style={{fontSize:'14px',lineHeight:'1.65',color:'#e5e7eb'}}>{analysis.summary}</p>
      </div>

      <SectionCard title="Price Assessment" icon="$">
        <div style={{marginBottom:'12px',display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}}>
          <Badge text={analysis.priceAssessment.verdict} bg="#ffedd5" color="#9a3412" border="#fed7aa" />
          <span style={{fontSize:'12px',color:'#6b7280'}}>Confidence: {analysis.priceAssessment.confidence}</span>
        </div>
        <p style={bodyText}>{analysis.priceAssessment.detail}</p>
      </SectionCard>

      <SectionCard title="Time on Market" icon={"\u23f1\ufe0f"}>
        <div style={{marginBottom:'12px'}}>
          <Badge text={analysis.timeOnMarket.signal} bg="#fef3c7" color="#92400e" border="#fde68a" />
        </div>
        <p style={bodyText}>{analysis.timeOnMarket.detail}</p>
      </SectionCard>

      {analysis.risks && analysis.risks.length > 0 && (
        <SectionCard title="Risk Factors" icon={"\u26a0\ufe0f"}>
          {analysis.risks.map((risk, i) => (
            <div key={i} style={{paddingTop: i>0?'16px':'0',marginTop: i>0?'16px':'0',borderTop: i>0?'1px solid #f3f4f6':'none'}}>
              <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px'}}>
                <span style={{fontSize:'14px',fontWeight:500,color:'#111827'}}>{risk.category}</span>
                <RiskBadge level={risk.level} />
              </div>
              <p style={bodyText}>{risk.detail}</p>
            </div>
          ))}
        </SectionCard>
      )}

      <SectionCard title="Negotiation Strategy" icon={"\ud83e\udd1d"}>
        <div style={{marginBottom:'12px',display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap'}}>
          <Badge text={analysis.negotiation.strategy} bg="#dbeafe" color="#1e40af" border="#bfdbfe" />
          <span style={{fontSize:'13px',color:'#4b5563'}}>Opening range: <strong style={{color:'#111827'}}>{analysis.negotiation.openingOffer}</strong></span>
        </div>
        <p style={{...bodyText,marginBottom:'16px'}}>{analysis.negotiation.detail}</p>
        {analysis.negotiation.psychologyNotes && analysis.negotiation.psychologyNotes.length > 0 && (
          <div style={{background:'#eff6ff',borderRadius:'8px',padding:'16px'}}>
            <p style={{fontSize:'12px',fontWeight:500,color:'#1e40af',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'10px'}}>Watch for these tactics</p>
            {analysis.negotiation.psychologyNotes.map((note, i) => (
              <div key={i} style={{display:'flex',gap:'8px',marginBottom:'8px'}}>
                <span style={{color:'#60a5fa',flexShrink:0}}>{"\u2192"}</span>
                <p style={{fontSize:'13px',color:'#1e3a8a',lineHeight:'1.55'}}>{note}</p>
              </div>
            ))}
          </div>
        )}
      </SectionCard>

      <SectionCard title="Area Outlook" icon={"\ud83d\udcc8"}>
        <div style={{marginBottom:'12px'}}>
          <Badge text={analysis.areaOutlook.trajectory} bg="#d1fae5" color="#065f46" border="#a7f3d0" />
        </div>
        <p style={bodyText}>{analysis.areaOutlook.detail}</p>
      </SectionCard>

      {analysis.buyerPsychology && analysis.buyerPsychology.flags && analysis.buyerPsychology.flags.length > 0 && (
        <SectionCard title="Buyer Psychology Check" icon={"\ud83e\udde0"}>
          <p style={{fontSize:'13px',color:'#6b7280',marginBottom:'16px'}}>Cognitive biases that may be affecting your assessment of this property.</p>
          {analysis.buyerPsychology.flags.map((flag, i) => (
            <div key={i} style={{paddingTop: i>0?'16px':'0',marginTop: i>0?'16px':'0',borderTop: i>0?'1px solid #f3f4f6':'none'}}>
              <p style={{fontSize:'14px',fontWeight:500,color:'#111827',marginBottom:'4px'}}>{flag.bias}</p>
              <p style={bodyText}>{flag.warning}</p>
            </div>
          ))}
        </SectionCard>
      )}

      <div style={{textAlign:'center',padding:'20px 0'}}>
        <p style={{fontSize:'11px',color:'#9ca3af',maxWidth:'500px',margin:'0 auto',lineHeight:'1.5'}}>
          This analysis is generated for informational purposes only and does not constitute financial, legal, or property advice.
          Always conduct independent due diligence including professional building inspections, legal searches, and financial assessments before purchasing property.
        </p>
      </div>
    </div>
  );
}

/* --- Manual Entry Form --- */
function ManualEntryForm({ onAnalyse, onBack }) {
  const [form, setForm] = useState({
    address:'', suburb:'', state:'NSW', price:'', type:'House',
    beds:'', baths:'', parking:'', land:'', daysOnMarket:'', agent:'', notes:''
  });
  const update = (field) => (e) => setForm({...form, [field]: e.target.value});

  const inputStyle = {width:'100%',background:'#fff',border:'1px solid #d1d5db',borderRadius:'8px',padding:'10px 12px',fontSize:'14px',color:'#111827',outline:'none',fontFamily:'inherit'};
  const labelStyle = {display:'block',fontSize:'13px',fontWeight:500,color:'#374151',marginBottom:'4px'};

  return (
    <div style={{background:'#fff',borderRadius:'12px',border:'1px solid #e5e7eb',padding:'24px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}}>
        <h3 style={{fontSize:'15px',fontWeight:600,color:'#111827'}}>Property Details</h3>
        <button onClick={onBack} style={{fontSize:'13px',color:'#6b7280',background:'none',border:'none',cursor:'pointer'}}>{"\u2190"} Back</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'}}>
        <div style={{gridColumn:'1 / -1'}}>
          <label style={labelStyle}>Street Address</label>
          <input style={inputStyle} placeholder="123 Example Street" value={form.address} onChange={update('address')} />
        </div>
        <div>
          <label style={labelStyle}>Suburb</label>
          <input style={inputStyle} placeholder="Marrickville" value={form.suburb} onChange={update('suburb')} />
        </div>
        <div>
          <label style={labelStyle}>State</label>
          <select style={inputStyle} value={form.state} onChange={update('state')}>
            {['NSW','VIC','QLD','WA','SA','TAS','ACT','NT'].map(s => <option key={s}>{s}</option>)}
          </select>
        </div>
        <div>
          <label style={labelStyle}>Asking Price</label>
          <input style={inputStyle} placeholder="$1,185,000" value={form.price} onChange={update('price')} />
        </div>
        <div>
          <label style={labelStyle}>Property Type</label>
          <select style={inputStyle} value={form.type} onChange={update('type')}>
            {['House','Apartment','Townhouse','Villa','Duplex','Land','Rural'].map(t => <option key={t}>{t}</option>)}
          </select>
        </div>
        <div>
          <label style={labelStyle}>Bedrooms</label>
          <input style={inputStyle} type="number" placeholder="3" value={form.beds} onChange={update('beds')} />
        </div>
        <div>
          <label style={labelStyle}>Bathrooms</label>
          <input style={inputStyle} type="number" placeholder="1" value={form.baths} onChange={update('baths')} />
        </div>
        <div>
          <label style={labelStyle}>Parking</label>
          <input style={inputStyle} type="number" placeholder="1" value={form.parking} onChange={update('parking')} />
        </div>
        <div>
          <label style={labelStyle}>Land Size</label>
          <input style={inputStyle} placeholder="354 sqm" value={form.land} onChange={update('land')} />
        </div>
        <div>
          <label style={labelStyle}>Days on Market</label>
          <input style={inputStyle} type="number" placeholder="47" value={form.daysOnMarket} onChange={update('daysOnMarket')} />
        </div>
        <div>
          <label style={labelStyle}>Listing Agent</label>
          <input style={inputStyle} placeholder="Agency name" value={form.agent} onChange={update('agent')} />
        </div>
        <div style={{gridColumn:'1 / -1'}}>
          <label style={labelStyle}>Anything else you noticed?</label>
          <textarea style={{...inputStyle,resize:'none',height:'80px'}} placeholder="E.g. agent seemed eager to sell, noticed cracks in walls, neighbours mentioned flooding..." value={form.notes} onChange={update('notes')} />
        </div>
      </div>
      <button onClick={() => onAnalyse(form)} style={{marginTop:'20px',width:'100%',background:'#111827',color:'#fff',fontSize:'14px',fontWeight:500,padding:'12px',borderRadius:'8px',border:'none',cursor:'pointer'}}>
        Analyse This Property
      </button>

/* --- Settings Panel --- */

  const [key, setKey] = useState(apiKey || '');
  const [visible, setVisible] = useState(false);

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:'16px'}}>
      <div style={{background:'#fff',borderRadius:'16px',padding:'24px',maxWidth:'480px',width:'100%',boxShadow:'0 20px 60px rgba(0,0,0,0.15)'}}>
        <h3 style={{fontSize:'16px',fontWeight:600,color:'#111827',marginBottom:'4px'}}>API Settings</h3>
        <p style={{fontSize:'13px',color:'#6b7280',marginBottom:'16px'}}>Enter your Claude API key. It stays in your browser only.</p>
        <label style={{display:'block',fontSize:'13px',fontWeight:500,color:'#374151',marginBottom:'4px'}}>Claude API Key</label>
        <div style={{display:'flex',gap:'8px',marginBottom:'16px'}}>
          <input
            type={visible ? 'text' : 'password'}
            value={key}
            onChange={(e) => setKey(e.target.value)}
            placeholder="sk-ant-..."
            style={{flex:1,background:'#f9fafb',border:'1px solid #d1d5db',borderRadius:'8px',padding:'10px 12px',fontSize:'14px',color:'#111827',outline:'none',fontFamily:'monospace'}}
          />
          <button onClick={() => setVisible(!visible)} style={{background:'#f3f4f6',border:'1px solid #d1d5db',borderRadius:'8px',padding:'0 12px',fontSize:'12px',color:'#374151',cursor:'pointer'}}>
            {visible ? 'Hide' : 'Show'}
          </button>
        </div>
        <p style={{fontSize:'11px',color:'#9ca3af',marginBottom:'16px'}}>Get a key at console.anthropic.com. Each analysis costs roughly $0.01-$0.05.</p>
        <div style={{display:'flex',gap:'8px',justifyContent:'flex-end'}}>
          <button onClick={onClose} style={{background:'#fff',border:'1px solid #d1d5db',borderRadius:'8px',padding:'8px 16px',fontSize:'13px',color:'#374151',cursor:'pointer'}}>Cancel</button>
          <button onClick={() => { onSave(key); onClose(); }} disabled={!key.startsWith('sk-')} style={{background: key.startsWith('sk-') ? '#111827' : '#d1d5db',color:'#fff',border:'none',borderRadius:'8px',padding:'8px 16px',fontSize:'13px',fontWeight:500,cursor: key.startsWith('sk-') ? 'pointer' : 'not-allowed'}}>Save</button>
        </div>
      </div>
    </div>
  );
}

/* --- Error Display --- */
function ErrorMessage({ message, onRetry, onBack }) {
  return (
    <div style={{background:'#fff',borderRadius:'12px',border:'1px solid #fecaca',padding:'24px',textAlign:'center'}}>
      <p style={{fontSize:'20px',marginBottom:'8px'}}>{"\u26a0\ufe0f"}</p>
      <p style={{fontSize:'15px',fontWeight:500,color:'#991b1b',marginBottom:'8px'}}>Analysis Failed</p>
      <p style={{fontSize:'13px',color:'#6b7280',marginBottom:'20px',maxWidth:'400px',margin:'0 auto 20px'}}>{message}</p>
      <div style={{display:'flex',gap:'8px',justifyContent:'center'}}>
        <button onClick={onBack} style={{background:'#fff',border:'1px solid #d1d5db',borderRadius:'8px',padding:'8px 16px',fontSize:'13px',color:'#374151',cursor:'pointer'}}>Back</button>
        <button onClick={onRetry} style={{background:'#111827',color:'#fff',border:'none',borderRadius:'8px',padding:'8px 16px',fontSize:'13px',fontWeight:500,cursor:'pointer'}}>Try Again</button>
      </div>
    </div>
  );
}

/* --- Main App --- */
function App() {
  const [view, setView] = useState('home');
  const [url, setUrl] = useState('');
  const [apiKey, setApiKey] = useState('');
  const [showSettings, setShowSettings] = useState(false);
  const [reportData, setReportData] = useState(null);
  const [error, setError] = useState('');
  const [lastRequest, setLastRequest] = useState(null);
  const reportRef = useRef(null);

  const doAnalysis = useCallback(async (listingUrl, manualDetails) => {
    if (!apiKey) {
      setShowSettings(true);
      return;
    }
    setView('loading');
    setError('');
    setLastRequest({ listingUrl, manualDetails });
    try {
      const result = await analyseProperty(apiKey, listingUrl, manualDetails);
      setReportData(result);
      setView('report');
    } catch (err) {
      setError(err.message || 'Something went wrong. Please try again.');
      setView('error');
    }
  }, [apiKey]);

  const handleUrlSubmit = () => {
    if (!url.trim()) return;
    doAnalysis(url.trim(), null);
  };

  const handleManualSubmit = (form) => {
    doAnalysis(null, form);
  };

  const handleRetry = () => {
    if (lastRequest) doAnalysis(lastRequest.listingUrl, lastRequest.manualDetails);
  };

  useEffect(() => {
    if (view === 'report' && reportRef.current) {
      reportRef.current.scrollIntoView({ behavior: 'smooth' });
    }
  }, [view]);

  const inputStyle = {flex:1,background:'#f9fafb',border:'1px solid #d1d5db',borderRadius:'8px',padding:'12px 16px',fontSize:'14px',color:'#111827',outline:'none',fontFamily:'inherit'};

  return (
    <div style={{minHeight:'100vh',background:'#f9fafb'}}>
      <header style={{background:'#fff',borderBottom:'1px solid #e5e7eb'}}>
        <div style={{maxWidth:'720px',margin:'0 auto',padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <button onClick={() => {setView('home');setUrl('');setError('');}} style={{display:'flex',alignItems:'center',gap:'8px',background:'none',border:'none',cursor:'pointer'}}>
            <div style={{width:'32px',height:'32px',background:'#111827',borderRadius:'8px',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <span style={{color:'#fff',fontSize:'12px',fontWeight:700}}>PQ</span>
            </div>
            <span style={{fontSize:'16px',fontWeight:600,color:'#111827'}}>PropertyIQ</span>
          </button>
          <div style={{display:'flex',gap:'12px',alignItems:'center'}}>
            {view === 'report' && (
              <button onClick={() => {setView('home');setUrl('');}} style={{fontSize:'13px',color:'#6b7280',background:'none',border:'none',cursor:'pointer'}}>New Analysis</button>
            )}
            <button onClick={() => setShowSettings(true)} style={{fontSize:'13px',color: apiKey ? '#059669' : '#dc2626',background:'none',border:'none',cursor:'pointer'}}>
              {apiKey ? '\u25cf Connected' : '\u25cb Set API Key'}
            </button>
          </div>
        </div>
      </header>

      {showSettings && <SettingsPanel apiKey={apiKey} onSave={setApiKey} onClose={() => setShowSettings(false)} />}

      <main style={{maxWidth:'720px',margin:'0 auto',padding:'24px 16px'}}>
        {view === 'home' && (
          <div>
            {!apiKey && (
              <div style={{background:'#fef3c7',border:'1px solid #fde68a',borderRadius:'12px',padding:'16px',marginBottom:'24px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'12px'}}>
                <p style={{fontSize:'13px',color:'#92400e'}}>Set your Claude API key to enable live property analysis.</p>
                <button onClick={() => setShowSettings(true)} style={{background:'#92400e',color:'#fff',border:'none',borderRadius:'8px',padding:'8px 16px',fontSize:'13px',fontWeight:500,cursor:'pointer'}}>Set API Key</button>
              </div>
            )}

            <div style={{textAlign:'center',marginBottom:'40px'}}>
              <h1 style={{fontSize:'28px',fontWeight:700,color:'#111827',marginBottom:'12px'}}>Should you buy this property?</h1>
              <p style={{color:'#6b7280',fontSize:'15px',maxWidth:'420px',margin:'0 auto',lineHeight:'1.5'}}>
                Paste a listing URL and get an AI-powered analysis covering pricing, risks, negotiation strategy, and buyer psychology.
              </p>
            </div>

            <div style={{background:'#fff',borderRadius:'12px',border:'1px solid #e5e7eb',padding:'20px 24px',marginBottom:'16px'}}>
              <label style={{display:'block',fontSize:'13px',fontWeight:500,color:'#374151',marginBottom:'8px'}}>Listing URL</label>
              <div style={{display:'flex',gap:'8px'}}>
                <input
                  type="url" value={url} onChange={(e) => setUrl(e.target.value)}
                  placeholder="Paste a Domain, REA, or other listing URL..."
                  style={inputStyle}
                  onKeyDown={(e) => e.key === 'Enter' && handleUrlSubmit()}
                />
                <button onClick={handleUrlSubmit} disabled={!url.trim()}
                  style={{background: url.trim() ? '#111827' : '#d1d5db',color:'#fff',fontSize:'14px',fontWeight:500,padding:'12px 24px',borderRadius:'8px',border:'none',cursor: url.trim() ? 'pointer' : 'not-allowed',whiteSpace:'nowrap'}}>
                  Analyse
                </button>
              </div>
            </div>

            <div style={{textAlign:'center'}}>
              <button onClick={() => setView('manual')} style={{fontSize:'13px',color:'#6b7280',background:'none',border:'none',cursor:'pointer',textDecoration:'underline',textUnderlineOffset:'3px'}}>
                Property not listed online? Enter details manually
              </button>
            </div>

            <div style={{marginTop:'48px',display:'grid',gridTemplateColumns:'repeat(3, 1fr)',gap:'16px'}}>
              {[
                { icon:'\ud83d\udd17', title:'Paste a listing', desc:'Drop in a URL from Domain, REA, or any major listings site.' },
                { icon:'\ud83d\udd0d', title:'AI analyses it', desc:'Pricing, risks, area outlook, and negotiation leverage \u2014 all assessed.' },
                { icon:'\ud83e\udde0', title:'Smarter decisions', desc:'Buyer psychology flags so you negotiate with your head, not your heart.' }
              ].map((item, i) => (
                <div key={i} style={{background:'#fff',borderRadius:'12px',border:'1px solid #e5e7eb',padding:'16px',textAlign:'center'}}>
                  <span style={{fontSize:'24px',display:'block',marginBottom:'8px'}}>{item.icon}</span>
                  <p style={{fontSize:'13px',fontWeight:500,color:'#111827',marginBottom:'4px'}}>{item.title}</p>
                  <p style={{fontSize:'12px',color:'#6b7280',lineHeight:'1.4'}}>{item.desc}</p>
                </div>
              ))}
            </div>
          </div>
        )}

        {view === 'manual' && <ManualEntryForm onAnalyse={handleManualSubmit} onBack={() => setView('home')} />}
        {view === 'loading' && <LoadingState />}
        {view === 'error' && <ErrorMessage message={error} onRetry={handleRetry} onBack={() => {setView('home');setError('');}} />}
        {view === 'report' && reportData && (
          <div ref={reportRef}><AnalysisReport data={reportData} /></div>
        )}
      </main>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
