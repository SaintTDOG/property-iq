<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropertyIQ — AI Property Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; color: #1a1a1a; -webkit-font-smoothing: antialiased; line-height: 1.6; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.fade-up { animation: fadeUp 0.4s ease-out forwards; }
input:focus, textarea:focus, select:focus { outline: none; border-color: #1a1a1a; }
::selection { background: #e8e4df; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const WORKER_URL = "https://property-iq.falling-truth-0423.workers.dev";

async function analyseProperty(listingUrl, manualDetails, bookmarkletData) {
  const payload = {};
  if (listingUrl) payload.listingUrl = listingUrl;
  if (manualDetails) payload.manualDetails = manualDetails;
  if (bookmarkletData) payload.bookmarkletData = bookmarkletData;
  const response = await fetch(WORKER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  const data = await response.json();
  if (!response.ok) throw new Error(data.error || "Analysis failed");
  return data;
}

/* ─── Bookmarklet code (minified, injected into bookmark href) ─── */
const BOOKMARKLET_CODE = `javascript:void(function(){try{var d={},u=location.href;d.url=u;if(u.includes('realestate.com.au')){if(window.ArgonautExchange){var s=JSON.stringify(window.ArgonautExchange);var p=function(r){return(s.match(new RegExp('"'+r+'":\\\\s*"([^"]+)"'))||[])[1]};var n=function(r){return(s.match(new RegExp('"'+r+'":\\\\s*(\\\\d+)'))||[])[1]};d.price=p('displayPrice')||p('priceDisplay')||p('price');d.address=p('displayAddress')||[p('streetAddress'),p('suburb'),p('state'),p('postcode')].filter(Boolean).join(', ');d.suburb=p('suburb');d.state=p('state');d.postcode=p('postcode');d.beds=n('bedrooms')?parseInt(n('bedrooms')):null;d.baths=n('bathrooms')?parseInt(n('bathrooms')):null;d.parking=n('parkingSpaces')||n('carSpaces')?parseInt(n('parkingSpaces')||n('carSpaces')):null;d.land=(n('landSize')||n('landAreaSqm'))?(n('landSize')||n('landAreaSqm'))+' sqm':null;d.type=p('propertyType');d.agent=[p('agentName'),p('agencyName')||p('brandName')].filter(Boolean).join(' - ');var dm=s.match(/"description":\\\\s*"((?:[^"\\\\\\\\]|\\\\\\\\.)*)"/);if(dm)d.description=dm[1].replace(/\\\\\\\\n/g,' ').substring(0,300);d.daysOnMarket=n('daysOnMarket')?parseInt(n('daysOnMarket')):null}else{d.address=document.querySelector('h1')?.textContent?.trim();d.price=document.querySelector('[data-testid=\\"listing-details__summary-title\\"]')?.textContent?.trim()}}else if(u.includes('domain.com.au')){var nd=document.getElementById('__NEXT_DATA__');if(nd){var j=JSON.stringify(JSON.parse(nd.textContent));var p2=function(r){return(j.match(new RegExp('"'+r+'":\\\\s*"([^"]+)"'))||[])[1]};var n2=function(r){return(j.match(new RegExp('"'+r+'":\\\\s*(\\\\d+)'))||[])[1]};d.price=p2('price')||p2('displayPrice');d.address=p2('displayAddress');d.suburb=p2('suburb');d.state=p2('state');d.beds=n2('bedrooms')?parseInt(n2('bedrooms')):null;d.baths=n2('bathrooms')?parseInt(n2('bathrooms')):null;d.parking=n2('carSpaces')?parseInt(n2('carSpaces')):null;d.type=p2('propertyType');var dm2=j.match(/"description":\\\\s*"((?:[^"\\\\\\\\]|\\\\\\\\.)*)"/);if(dm2)d.description=dm2[1].replace(/\\\\\\\\n/g,' ').substring(0,300)}}d.source='bookmarklet';var e=encodeURIComponent(JSON.stringify(d));window.open('https://sainttdog.github.io/property-iq/?bk='+e,'_blank')}catch(err){alert('PropertyIQ: Could not extract data. '+err.message)}})()`;

/* ─── Verdict colour logic ─── */
function verdictStyle(verdict) {
  const v = (verdict || "").toLowerCase();
  if (v.includes("deal") || v.includes("underpriced")) return { bg: "#f0fdf4", color: "#15803d", border: "#bbf7d0" };
  if (v.includes("fair")) return { bg: "#fefce8", color: "#a16207", border: "#fef08a" };
  if (v.includes("over")) return { bg: "#fef2f2", color: "#dc2626", border: "#fecaca" };
  return { bg: "#f5f5f4", color: "#57534e", border: "#d6d3d1" };
}

function riskColor(level) {
  const l = (level || "").toLowerCase();
  if (l.includes("high")) return "#dc2626";
  if (l === "medium") return "#ea580c";
  if (l.includes("low-medium") || l.includes("low–medium")) return "#d97706";
  return "#16a34a";
}

function confidenceDots(conf) {
  const c = (conf || "").toLowerCase();
  const filled = c.includes("high") ? 3 : c.includes("medium") ? 2 : 1;
  return Array.from({length: 3}, (_, i) => (
    <span key={i} style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background: i < filled ? '#1a1a1a' : '#d4d4d4',marginRight:3}} />
  ));
}

/* ─── Loading ─── */
function LoadingState() {
  const steps = [
    "Fetching listing page...",
    "Extracting property details...",
    "Researching comparable sales...",
    "Analysing suburb & area intelligence...",
    "Projecting capital growth...",
    "Evaluating risks & opportunities...",
    "Building negotiation playbook...",
    "Profiling buyer psychology...",
    "Compiling your report..."
  ];
  const [current, setCurrent] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setCurrent(p => p < steps.length - 1 ? p + 1 : p), 2200);
    return () => clearInterval(t);
  }, []);
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'100px 20px',minHeight:'60vh'}}>
      <div style={{width:24,height:24,border:'2px solid #e5e5e5',borderTopColor:'#1a1a1a',borderRadius:'50%',animation:'spin 0.7s linear infinite',marginBottom:32}} />
      <div style={{textAlign:'center',maxWidth:300}}>
        {steps.map((s, i) => (
          <p key={i} style={{fontSize:13,padding:'4px 0',transition:'all 0.4s ease',color: i < current ? '#a3a3a3' : i === current ? '#1a1a1a' : '#e5e5e5',fontWeight: i === current ? 500 : 400}}>
            {i < current ? "\u2713 " : ""}{s}
          </p>
        ))}
      </div>
      <p style={{fontSize:11,color:'#a3a3a3',marginTop:32}}>Usually 20-40 seconds</p>
    </div>
  );
}

/* ─── Score Ring ─── */
function ScoreRing({ score, label, size = 64 }) {
  const r = (size - 8) / 2;
  const c = 2 * Math.PI * r;
  const pct = Math.max(0, Math.min(100, score)) / 100;
  const color = score >= 70 ? '#16a34a' : score >= 45 ? '#d97706' : '#dc2626';
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#f5f5f4" strokeWidth={4} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={4} strokeDasharray={c} strokeDashoffset={c * (1 - pct)} strokeLinecap="round" style={{transition:'stroke-dashoffset 1s ease'}} />
      </svg>
      <span style={{position:'relative',marginTop: -(size/2 + 8),fontSize: size > 50 ? 16 : 13,fontWeight:700,color}}>{score}</span>
      <span style={{fontSize:10,color:'#737373',marginTop: size > 50 ? 16 : 12,textTransform:'uppercase',letterSpacing:'0.06em',fontWeight:500}}>{label}</span>
    </div>
  );
}

/* ─── Section Component ─── */
function Section({ title, children, defaultOpen = true }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div style={{borderBottom:'1px solid #f0f0f0',paddingBottom: open ? 28 : 0,marginBottom:28}} className="fade-up">
      <button onClick={() => setOpen(!open)} style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',background:'none',border:'none',cursor:'pointer',padding:'0 0 16px',textAlign:'left'}}>
        <h3 style={{fontSize:14,fontWeight:600,color:'#1a1a1a',letterSpacing:'-0.01em'}}>{title}</h3>
        <span style={{fontSize:18,color:'#a3a3a3',transform: open ? 'rotate(0)' : 'rotate(-90deg)',transition:'transform 0.2s'}}>{"\u25BE"}</span>
      </button>
      {open && <div>{children}</div>}
    </div>
  );
}

/* ─── Stat Pill ─── */
function Stat({ label, value, sub }) {
  return (
    <div style={{background:'#fafaf9',borderRadius:8,padding:'12px 16px',flex:'1 1 140px',minWidth:120}}>
      <p style={{fontSize:10,color:'#737373',textTransform:'uppercase',letterSpacing:'0.06em',fontWeight:500,marginBottom:2}}>{label}</p>
      <p style={{fontSize:16,fontWeight:700,color:'#1a1a1a'}}>{value}</p>
      {sub && <p style={{fontSize:11,color:'#a3a3a3',marginTop:2}}>{sub}</p>}
    </div>
  );
}

/* ─── Property Header ─── */
function PropertyHeader({ listing }) {
  return (
    <div style={{marginBottom:32}} className="fade-up">
      <p style={{fontSize:12,color:'#a3a3a3',marginBottom:4}}>{listing.type}{listing.agent && listing.agent !== "N/A" ? " \u00B7 " + listing.agent : ""}</p>
      <h1 style={{fontSize:22,fontWeight:700,color:'#1a1a1a',letterSpacing:'-0.02em',marginBottom:4,lineHeight:1.3}}>{listing.address}</h1>
      <p style={{fontSize:28,fontWeight:700,color:'#1a1a1a',letterSpacing:'-0.02em',marginBottom:16}}>{listing.price}</p>
      <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
        {listing.beds != null && <span style={{fontSize:13,color:'#525252',background:'#fafaf9',borderRadius:6,padding:'4px 10px'}}>{listing.beds} bed</span>}
        {listing.baths != null && <span style={{fontSize:13,color:'#525252',background:'#fafaf9',borderRadius:6,padding:'4px 10px'}}>{listing.baths} bath</span>}
        {listing.parking != null && <span style={{fontSize:13,color:'#525252',background:'#fafaf9',borderRadius:6,padding:'4px 10px'}}>{listing.parking} car</span>}
        {listing.land && listing.land !== "N/A" && <span style={{fontSize:13,color:'#525252',background:'#fafaf9',borderRadius:6,padding:'4px 10px'}}>{listing.land}</span>}
        {listing.daysOnMarket != null && <span style={{fontSize:13,color:'#525252',background:'#fafaf9',borderRadius:6,padding:'4px 10px'}}>{listing.daysOnMarket} days listed</span>}
      </div>
      {listing.description && <p style={{fontSize:13,color:'#737373',marginTop:12,lineHeight:1.6}}>{listing.description}</p>}
    </div>
  );
}

/* ─── Full Report ─── */
function Report({ data }) {
  const { listing, analysis } = data;
  const t = {fontSize:14,color:'#404040',lineHeight:1.7};

  return (
    <div>
      <PropertyHeader listing={listing} />

      {/* ─── Verdict Banner ─── */}
      <div style={{background:'#1a1a1a',borderRadius:10,padding:'24px 28px',marginBottom:32}} className="fade-up">
        <p style={{fontSize:10,fontWeight:600,color:'#737373',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:10}}>Bottom Line</p>
        <p style={{fontSize:15,lineHeight:1.7,color:'#e5e5e5'}}>{analysis.summary}</p>
      </div>

      {/* ─── Score Cards Row ─── */}
      {analysis.scores && (
        <div style={{display:'flex',flexWrap:'wrap',gap:16,justifyContent:'center',marginBottom:36}} className="fade-up">
          {analysis.scores.overall != null && <ScoreRing score={analysis.scores.overall} label="Overall" size={72} />}
          {analysis.scores.value != null && <ScoreRing score={analysis.scores.value} label="Value" />}
          {analysis.scores.growth != null && <ScoreRing score={analysis.scores.growth} label="Growth" />}
          {analysis.scores.livability != null && <ScoreRing score={analysis.scores.livability} label="Livability" />}
          {analysis.scores.risk != null && <ScoreRing score={analysis.scores.risk} label="Risk" />}
        </div>
      )}

      {/* ─── Price Assessment ─── */}
      <Section title="Price Assessment">
        {(() => { const vs = verdictStyle(analysis.priceAssessment.verdict); return (
          <div style={{display:'inline-block',background:vs.bg,color:vs.color,border:'1px solid ' + vs.border,borderRadius:6,padding:'4px 12px',fontSize:13,fontWeight:600,marginBottom:12}}>
            {analysis.priceAssessment.verdict}
          </div>
        ); })()}
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
          <span style={{fontSize:11,color:'#a3a3a3'}}>Confidence</span>
          {confidenceDots(analysis.priceAssessment.confidence)}
        </div>
        <p style={t}>{analysis.priceAssessment.detail}</p>
        {analysis.priceAssessment.stampDuty && (
          <div style={{background:'#fafaf9',borderRadius:8,padding:'12px 16px',marginTop:12}}>
            <p style={{fontSize:12,color:'#737373'}}>Estimated stamp duty: <strong style={{color:'#1a1a1a'}}>{analysis.priceAssessment.stampDuty}</strong></p>
          </div>
        )}
      </Section>

      {/* ─── Comparable Sales ─── */}
      {analysis.comparativeValuation && (
        <Section title="Comparable Sales">
          <p style={t}>{analysis.comparativeValuation.detail}</p>
          {analysis.comparativeValuation.pricePerSqm && (
            <div style={{background:'#fafaf9',borderRadius:8,padding:'12px 16px',marginTop:12,marginBottom:12}}>
              <p style={{fontSize:12,color:'#737373'}}>Price per sqm: <strong style={{color:'#1a1a1a'}}>{analysis.comparativeValuation.pricePerSqm}</strong></p>
            </div>
          )}
          {analysis.comparativeValuation.recentComparables && analysis.comparativeValuation.recentComparables.length > 0 && (
            <div style={{marginTop:16}}>
              {analysis.comparativeValuation.recentComparables.map((c, i) => (
                <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',padding:'10px 0',borderTop: i > 0 ? '1px solid #f5f5f4' : 'none',gap:12,flexWrap:'wrap'}}>
                  <div>
                    <p style={{fontSize:13,fontWeight:500,color:'#1a1a1a'}}>{c.address}</p>
                    <p style={{fontSize:12,color:'#a3a3a3'}}>{c.notes}</p>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <p style={{fontSize:14,fontWeight:600,color:'#1a1a1a'}}>{c.price}</p>
                    <p style={{fontSize:11,color:'#a3a3a3'}}>{c.date}</p>
                  </div>
                </div>
              ))}
            </div>
          )}
        </Section>
      )}

      {/* ─── Capital Growth ─── */}
      {analysis.capitalGrowth && (
        <Section title="Capital Growth Outlook">
          <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}>
            <Stat label="5-Year" value={analysis.capitalGrowth.fiveYear} />
            <Stat label="10-Year" value={analysis.capitalGrowth.tenYear} />
            {analysis.capitalGrowth.rentalYield && <Stat label="Gross Yield" value={analysis.capitalGrowth.rentalYield} />}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
            <span style={{fontSize:11,color:'#a3a3a3'}}>Confidence</span>
            {confidenceDots(analysis.capitalGrowth.confidence)}
          </div>
          <p style={t}>{analysis.capitalGrowth.detail}</p>
          {analysis.capitalGrowth.drivers && analysis.capitalGrowth.drivers.length > 0 && (
            <div style={{marginTop:16}}>
              <p style={{fontSize:11,fontWeight:600,color:'#a3a3a3',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>Growth Drivers</p>
              {analysis.capitalGrowth.drivers.map((d, i) => (
                <p key={i} style={{fontSize:13,color:'#404040',padding:'4px 0',paddingLeft:16,position:'relative'}}>
                  <span style={{position:'absolute',left:0,color:'#16a34a'}}>{"\u2192"}</span>{d}
                </p>
              ))}
            </div>
          )}
        </Section>
      )}

      {/* ─── Benefits ─── */}
      {analysis.benefits && analysis.benefits.length > 0 && (
        <Section title="Benefits & Opportunities">
          {analysis.benefits.map((b, i) => (
            <div key={i} style={{marginBottom: i < analysis.benefits.length - 1 ? 16 : 0}}>
              <p style={{fontSize:13,fontWeight:600,color:'#1a1a1a',marginBottom:4}}>{b.category}</p>
              <p style={t}>{b.detail}</p>
            </div>
          ))}
        </Section>
      )}

      {/* ─── Suburb Intelligence ─── */}
      {analysis.suburbIntelligence && (
        <Section title="Suburb Intelligence">
          <p style={t}>{analysis.suburbIntelligence.overview}</p>
          {analysis.suburbIntelligence.demographics && (
            <div style={{marginTop:16}}>
              <p style={{fontSize:11,fontWeight:600,color:'#a3a3a3',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>Demographics & Lifestyle</p>
              <p style={t}>{analysis.suburbIntelligence.demographics}</p>
            </div>
          )}
          {analysis.suburbIntelligence.infrastructure && (
            <div style={{marginTop:16}}>
              <p style={{fontSize:11,fontWeight:600,color:'#a3a3a3',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>Infrastructure & Development</p>
              <p style={t}>{analysis.suburbIntelligence.infrastructure}</p>
            </div>
          )}
          {analysis.suburbIntelligence.communitysentiment && (
            <div style={{marginTop:16}}>
              <p style={{fontSize:11,fontWeight:600,color:'#a3a3a3',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>Community Sentiment</p>
              <p style={t}>{analysis.suburbIntelligence.communitysentiment}</p>
            </div>
          )}
          {analysis.suburbIntelligence.schools && (
            <div style={{marginTop:16}}>
              <p style={{fontSize:11,fontWeight:600,color:'#a3a3a3',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>Schools & Education</p>
              <p style={t}>{analysis.suburbIntelligence.schools}</p>
            </div>
          )}
          {analysis.suburbIntelligence.transport && (
            <div style={{marginTop:16}}>
              <p style={{fontSize:11,fontWeight:600,color:'#a3a3a3',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>Transport & Connectivity</p>
              <p style={t}>{analysis.suburbIntelligence.transport}</p>
            </div>
          )}
        </Section>
      )}

      {/* ─── Risk Factors ─── */}
      {analysis.risks && analysis.risks.length > 0 && (
        <Section title="Risk Factors">
          {analysis.risks.map((r, i) => (
            <div key={i} style={{marginBottom: i < analysis.risks.length - 1 ? 16 : 0}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                <p style={{fontSize:13,fontWeight:600,color:'#1a1a1a'}}>{r.category}</p>
                <span style={{fontSize:11,fontWeight:600,color:riskColor(r.level)}}>{r.level}</span>
              </div>
              <p style={t}>{r.detail}</p>
            </div>
          ))}
        </Section>
      )}

      {/* ─── Negotiation ─── */}
      <Section title="Negotiation Playbook">
        <div style={{display:'flex',flexWrap:'wrap',gap:12,marginBottom:16}}>
          <Stat label="Strategy" value={analysis.negotiation.strategy} />
          <Stat label="Opening Offer" value={analysis.negotiation.openingOffer} />
        </div>
        <p style={t}>{analysis.negotiation.detail}</p>
        {analysis.negotiation.psychologyNotes && analysis.negotiation.psychologyNotes.length > 0 && (
          <div style={{marginTop:16}}>
            <p style={{fontSize:11,fontWeight:600,color:'#a3a3a3',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>Agent & Vendor Tactics to Watch</p>
            {analysis.negotiation.psychologyNotes.map((n, i) => (
              <p key={i} style={{fontSize:13,color:'#404040',padding:'4px 0',paddingLeft:16,position:'relative'}}>
                <span style={{position:'absolute',left:0,color:'#3b82f6'}}>{"\u2192"}</span>{n}
              </p>
            ))}
          </div>
        )}
        {analysis.negotiation.whatToAsk && analysis.negotiation.whatToAsk.length > 0 && (
          <div style={{marginTop:16}}>
            <p style={{fontSize:11,fontWeight:600,color:'#a3a3a3',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>Questions to Ask the Agent</p>
            {analysis.negotiation.whatToAsk.map((q, i) => (
              <p key={i} style={{fontSize:13,color:'#404040',padding:'4px 0',paddingLeft:16,position:'relative'}}>
                <span style={{position:'absolute',left:0,color:'#8b5cf6'}}>?</span>{q}
              </p>
            ))}
          </div>
        )}
      </Section>

      {/* ─── Time on Market ─── */}
      <Section title="Time on Market Signal">
        <div style={{display:'inline-block',background:'#fafaf9',borderRadius:6,padding:'4px 12px',fontSize:13,fontWeight:600,color:'#525252',marginBottom:12}}>
          {analysis.timeOnMarket.signal}
        </div>
        <p style={t}>{analysis.timeOnMarket.detail}</p>
      </Section>

      {/* ─── Area Outlook ─── */}
      <Section title="Area Outlook">
        <div style={{display:'inline-block',background:'#f0fdf4',borderRadius:6,padding:'4px 12px',fontSize:13,fontWeight:600,color:'#15803d',marginBottom:12}}>
          {analysis.areaOutlook.trajectory}
        </div>
        <p style={t}>{analysis.areaOutlook.detail}</p>
      </Section>

      {/* ─── Buyer Psychology ─── */}
      {analysis.buyerPsychology && analysis.buyerPsychology.flags && analysis.buyerPsychology.flags.length > 0 && (
        <Section title="Buyer Psychology Check">
          <p style={{fontSize:12,color:'#a3a3a3',marginBottom:16}}>Cognitive biases that may be shaping your view of this property.</p>
          {analysis.buyerPsychology.flags.map((f, i) => (
            <div key={i} style={{marginBottom: i < analysis.buyerPsychology.flags.length - 1 ? 16 : 0}}>
              <p style={{fontSize:13,fontWeight:600,color:'#1a1a1a',marginBottom:4}}>{f.bias}</p>
              <p style={t}>{f.warning}</p>
            </div>
          ))}
        </Section>
      )}

      {/* ─── Due Diligence Checklist ─── */}
      {analysis.dueDiligence && analysis.dueDiligence.length > 0 && (
        <Section title="Due Diligence Checklist">
          {analysis.dueDiligence.map((item, i) => (
            <div key={i} style={{display:'flex',gap:10,padding:'6px 0'}}>
              <span style={{color:'#d4d4d4',fontSize:14,flexShrink:0}}>{"\u25A1"}</span>
              <p style={{fontSize:13,color:'#404040',lineHeight:1.6}}>{item}</p>
            </div>
          ))}
        </Section>
      )}

      {/* ─── Data Source Banner ─── */}
      {data._meta && (
        <div style={{background:'#fafaf9',borderRadius:8,padding:'12px 16px',marginBottom:24}} className="fade-up">
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
            <span style={{width:8,height:8,borderRadius:'50%',background:
              ['bookmarklet','structured_extraction','rea_api','domain_api_enriched'].includes(data._meta.method) ? '#16a34a' :
              ['domain_api','cleaned_html'].includes(data._meta.method) ? '#d97706' : '#dc2626',flexShrink:0}} />
            <span style={{fontSize:11,fontWeight:600,color:'#525252',textTransform:'uppercase',letterSpacing:'0.04em'}}>
              {data._meta.method === 'bookmarklet' ? 'Full listing data via bookmarklet' :
               data._meta.method === 'structured_extraction' ? 'Full listing data extracted' :
               data._meta.method === 'domain_api_enriched' ? 'Full data — Domain API + page extraction' :
               data._meta.method === 'domain_api' ? 'Partial data — Domain API match' :
               data._meta.method === 'rea_api' ? 'Data from REA API' :
               data._meta.method === 'cleaned_html' ? 'Partial data — page content analysed' :
               data._meta.method === 'url_inference' ? 'Limited data — URL inference only' :
               data._meta.method === 'manual_entry' ? 'Manual entry' : 'Analysis complete'}
            </span>
          </div>
          {data._meta.sources && data._meta.sources.length > 0 && (
            <p style={{fontSize:11,color:'#a3a3a3'}}>Sources: {data._meta.sources.join(', ')}</p>
          )}
          {data._meta.method === 'url_inference' && (
            <p style={{fontSize:11,color:'#8b5cf6',marginTop:4}}>
              Tip: Use the <a href="#" onClick={(e) => { e.preventDefault(); window.scrollTo({top:0,behavior:'smooth'}); }} style={{color:'#8b5cf6',textDecoration:'underline'}}>PropertyIQ bookmarklet</a> for full listing data and higher accuracy.
            </p>
          )}
        </div>
      )}

      {/* ─── Footer ─── */}
      <div style={{borderTop:'1px solid #f0f0f0',paddingTop:24,marginTop:8}}>
        <p style={{fontSize:11,color:'#a3a3a3',lineHeight:1.6,maxWidth:540}}>
          This analysis is generated by AI for informational purposes only. It does not constitute financial, legal, or property advice.
          Always conduct independent due diligence including professional inspections, legal searches, and financial assessments before purchasing property.
        </p>
        <p style={{fontSize:11,color:'#d4d4d4',marginTop:8}}>Powered by PropertyIQ &middot; Homeowner Assist</p>
      </div>
    </div>
  );
}

/* ─── Manual Entry Form ─── */
function ManualForm({ onAnalyse, onBack }) {
  const [form, setForm] = useState({
    address:'', suburb:'', state:'NSW', price:'', type:'House',
    beds:'', baths:'', parking:'', land:'', daysOnMarket:'', agent:'', notes:''
  });
  const u = (f) => (e) => setForm({...form, [f]: e.target.value});
  const is = {width:'100%',background:'#fafaf9',border:'1px solid #e5e5e5',borderRadius:8,padding:'10px 14px',fontSize:14,color:'#1a1a1a',fontFamily:'inherit'};
  const ls = {display:'block',fontSize:12,fontWeight:500,color:'#737373',marginBottom:4};
  return (
    <div className="fade-up">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
        <h2 style={{fontSize:16,fontWeight:600}}>Enter Property Details</h2>
        <button onClick={onBack} style={{fontSize:13,color:'#a3a3a3',background:'none',border:'none',cursor:'pointer'}}>{"\u2190"} Back</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div style={{gridColumn:'1/-1'}}><label style={ls}>Address</label><input style={is} placeholder="123 Example Street" value={form.address} onChange={u('address')} /></div>
        <div><label style={ls}>Suburb</label><input style={is} placeholder="Marrickville" value={form.suburb} onChange={u('suburb')} /></div>
        <div><label style={ls}>State</label><select style={is} value={form.state} onChange={u('state')}>{['NSW','VIC','QLD','WA','SA','TAS','ACT','NT'].map(s=><option key={s}>{s}</option>)}</select></div>
        <div><label style={ls}>Asking Price</label><input style={is} placeholder="$485,000" value={form.price} onChange={u('price')} /></div>
        <div><label style={ls}>Type</label><select style={is} value={form.type} onChange={u('type')}>{['House','Apartment','Townhouse','Villa','Duplex','Land','Rural'].map(t=><option key={t}>{t}</option>)}</select></div>
        <div><label style={ls}>Beds</label><input style={is} type="number" placeholder="3" value={form.beds} onChange={u('beds')} /></div>
        <div><label style={ls}>Baths</label><input style={is} type="number" placeholder="1" value={form.baths} onChange={u('baths')} /></div>
        <div><label style={ls}>Parking</label><input style={is} type="number" placeholder="1" value={form.parking} onChange={u('parking')} /></div>
        <div><label style={ls}>Land Size</label><input style={is} placeholder="600 sqm" value={form.land} onChange={u('land')} /></div>
        <div><label style={ls}>Days on Market</label><input style={is} type="number" placeholder="47" value={form.daysOnMarket} onChange={u('daysOnMarket')} /></div>
        <div><label style={ls}>Agent</label><input style={is} placeholder="Agency name" value={form.agent} onChange={u('agent')} /></div>
        <div style={{gridColumn:'1/-1'}}><label style={ls}>Notes</label><textarea style={{...is,resize:'none',height:80}} placeholder="Anything you noticed \u2014 cracks, eager agent, flooding, neighbours..." value={form.notes} onChange={u('notes')} /></div>
      </div>
      <button onClick={() => onAnalyse(form)} style={{marginTop:20,width:'100%',background:'#1a1a1a',color:'#fff',fontSize:14,fontWeight:500,padding:'12px',borderRadius:8,border:'none',cursor:'pointer'}}>
        Analyse This Property
      </button>
    </div>
  );
}

/* ─── Error ─── */
function ErrorMsg({ message, onRetry, onBack }) {
  return (
    <div style={{textAlign:'center',padding:'60px 20px'}} className="fade-up">
      <p style={{fontSize:15,fontWeight:500,color:'#dc2626',marginBottom:8}}>Analysis failed</p>
      <p style={{fontSize:13,color:'#737373',marginBottom:24,maxWidth:400,margin:'0 auto 24px'}}>{message}</p>
      <div style={{display:'flex',gap:8,justifyContent:'center'}}>
        <button onClick={onBack} style={{background:'#fafaf9',border:'1px solid #e5e5e5',borderRadius:8,padding:'8px 20px',fontSize:13,color:'#525252',cursor:'pointer'}}>Back</button>
        <button onClick={onRetry} style={{background:'#1a1a1a',color:'#fff',border:'none',borderRadius:8,padding:'8px 20px',fontSize:13,fontWeight:500,cursor:'pointer'}}>Retry</button>
      </div>
    </div>
  );
}

/* ─── App ─── */
function App() {
  const [view, setView] = useState('home');
  const [url, setUrl] = useState('');
  const [data, setData] = useState(null);
  const [error, setError] = useState('');
  const [last, setLast] = useState(null);
  const [showBookmarklet, setShowBookmarklet] = useState(false);
  const ref = useRef(null);

  const run = useCallback(async (listingUrl, manual, bkData) => {
    setView('loading'); setError(''); setLast({ listingUrl, manual, bkData });
    try { const r = await analyseProperty(listingUrl, manual, bkData); setData(r); setView('report'); }
    catch (e) { setError(e.message); setView('error'); }
  }, []);

  const submit = () => { if (url.trim()) run(url.trim(), null, null); };

  // Handle bookmarklet data from URL params
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const bk = params.get('bk');
    if (bk) {
      try {
        const bkData = JSON.parse(decodeURIComponent(bk));
        const bkUrl = bkData.url || null;
        delete bkData.url;
        delete bkData.source;
        // Clean the URL
        window.history.replaceState({}, '', window.location.pathname);
        run(bkUrl, null, bkData);
      } catch(e) { console.error('Bookmarklet parse error:', e); }
    }
  }, []);

  useEffect(() => {
    if (view === 'report' && ref.current) ref.current.scrollIntoView({ behavior: 'smooth' });
  }, [view]);

  return (
    <div style={{minHeight:'100vh',background:'#fff'}}>
      {/* ─── Header ─── */}
      <header style={{borderBottom:'1px solid #f0f0f0',position:'sticky',top:0,background:'rgba(255,255,255,0.95)',backdropFilter:'blur(8px)',zIndex:10}}>
        <div style={{maxWidth:640,margin:'0 auto',padding:'12px 20px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <button onClick={() => {setView('home');setUrl('');setError('');}} style={{display:'flex',alignItems:'center',gap:8,background:'none',border:'none',cursor:'pointer'}}>
            <span style={{fontSize:15,fontWeight:700,color:'#1a1a1a',letterSpacing:'-0.02em'}}>PropertyIQ</span>
          </button>
          {view === 'report' && (
            <button onClick={() => {setView('home');setUrl('');}} style={{fontSize:12,color:'#a3a3a3',background:'none',border:'none',cursor:'pointer'}}>New analysis</button>
          )}
        </div>
      </header>

      <main style={{maxWidth:640,margin:'0 auto',padding:'32px 20px'}}>
        {view === 'home' && (
          <div className="fade-up">
            <div style={{marginBottom:48}}>
              <h1 style={{fontSize:28,fontWeight:700,color:'#1a1a1a',letterSpacing:'-0.03em',lineHeight:1.2,marginBottom:8}}>Should you buy<br/>this property?</h1>
              <p style={{color:'#737373',fontSize:15,lineHeight:1.6}}>Paste a listing URL. Get an AI-powered analysis that goes deeper than any agent will.</p>
            </div>

            <div style={{marginBottom:12}}>
              <div style={{display:'flex',gap:8}}>
                <input type="url" value={url} onChange={(e) => setUrl(e.target.value)}
                  placeholder="Paste a Domain or REA listing URL..."
                  style={{flex:1,background:'#fafaf9',border:'1px solid #e5e5e5',borderRadius:8,padding:'12px 16px',fontSize:14,color:'#1a1a1a',fontFamily:'inherit'}}
                  onKeyDown={(e) => e.key === 'Enter' && submit()}
                />
                <button onClick={submit} disabled={!url.trim()}
                  style={{background: url.trim() ? '#1a1a1a' : '#e5e5e5',color:'#fff',fontSize:14,fontWeight:500,padding:'12px 28px',borderRadius:8,border:'none',cursor: url.trim() ? 'pointer' : 'default',transition:'background 0.2s'}}>
                  Analyse
                </button>
              </div>
            </div>

            <div style={{display:'flex',gap:16,marginTop:4}}>
              <button onClick={() => setView('manual')} style={{fontSize:12,color:'#a3a3a3',background:'none',border:'none',cursor:'pointer'}}>
                Enter details manually
              </button>
              <button onClick={() => setShowBookmarklet(!showBookmarklet)} style={{fontSize:12,color:'#8b5cf6',background:'none',border:'none',cursor:'pointer',fontWeight:500}}>
                {showBookmarklet ? 'Hide setup' : 'Get better results'}
              </button>
            </div>

            {showBookmarklet && (
              <div style={{marginTop:24,background:'#fafaf9',borderRadius:12,padding:'20px 24px',border:'1px solid #f0f0f0'}} className="fade-up">
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                  <span style={{width:8,height:8,borderRadius:'50%',background:'#16a34a',flexShrink:0}} />
                  <p style={{fontSize:13,fontWeight:600,color:'#1a1a1a'}}>Unlock full listing data</p>
                </div>
                <p style={{fontSize:13,color:'#737373',lineHeight:1.6,marginBottom:16}}>
                  Property sites block our server from reading listings directly. The PropertyIQ bookmarklet runs in your browser — where the listing is already loaded — and extracts the full details (price, beds, baths, land, description, agent) for a much more accurate analysis.
                </p>
                <p style={{fontSize:12,fontWeight:600,color:'#525252',marginBottom:8}}>Setup (one time, 10 seconds):</p>
                <div style={{fontSize:13,color:'#404040',lineHeight:1.8,marginBottom:16}}>
                  <p>1. Drag this button to your bookmarks bar:</p>
                  <div style={{margin:'12px 0'}}>
                    <a href={BOOKMARKLET_CODE}
                      onClick={(e) => e.preventDefault()}
                      onDragStart={(e) => { e.dataTransfer.setData('text/uri-list', BOOKMARKLET_CODE); e.dataTransfer.setData('text/plain', BOOKMARKLET_CODE); }}
                      style={{display:'inline-block',background:'#1a1a1a',color:'#fff',fontSize:13,fontWeight:600,padding:'8px 20px',borderRadius:8,textDecoration:'none',cursor:'grab',userSelect:'none'}}>
                      Analyse with PropertyIQ
                    </a>
                  </div>
                  <p>2. Go to any listing on realestate.com.au or domain.com.au</p>
                  <p>3. Click the bookmarklet in your bookmarks bar</p>
                  <p>4. PropertyIQ opens with the full listing data pre-loaded</p>
                </div>
                <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
                  <div style={{flex:1,minWidth:140,background:'#fff',borderRadius:8,padding:'10px 14px',border:'1px solid #f0f0f0'}}>
                    <p style={{fontSize:10,fontWeight:600,color:'#dc2626',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:4}}>Without bookmarklet</p>
                    <p style={{fontSize:12,color:'#737373'}}>Suburb-level analysis based on URL and AI knowledge</p>
                  </div>
                  <div style={{flex:1,minWidth:140,background:'#fff',borderRadius:8,padding:'10px 14px',border:'1px solid #16a34a'}}>
                    <p style={{fontSize:10,fontWeight:600,color:'#16a34a',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:4}}>With bookmarklet</p>
                    <p style={{fontSize:12,color:'#737373'}}>Exact price, beds, baths, land, agent, description — full precision</p>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {view === 'manual' && <ManualForm onAnalyse={(f) => run(null, f)} onBack={() => setView('home')} />}
        {view === 'loading' && <LoadingState />}
        {view === 'error' && <ErrorMsg message={error} onRetry={() => last && run(last.listingUrl, last.manual, last.bkData)} onBack={() => {setView('home');setError('');}} />}
        {view === 'report' && data && <div ref={ref}><Report data={data} /></div>}
      </main>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
